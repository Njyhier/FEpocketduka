<div id="contain" class="flex text-white font-light gap-12">
  <nav class="gap-12 hidden md:flex">
    <ul class="flex gap-8">
      <li><button (click)="goToHome()">Home</button></li>
      <li><button (click)="navigateToProducts()">Shop</button></li>
      <li>Deals</li>
      <li>About</li>
      <li>Contact</li>
    </ul>
    <app-searchbar-component></app-searchbar-component>
  </nav>
  <nav id="ttnt">
    <ul class="flex items-center gap-5 text-white">
      <li>
        <a href="/" class="hidden md:flex"><i class="fa-solid fa-magnifying-glass"></i></a>
      </li>
      <li class="relative">
        <i class="fa-solid fa-cart-arrow-down" (click)="goToCart()"></i>
        <p
          class="absolute -top-2 -right-3 bg-orange-500 rounded-full h-fit w-5 text-center text-sm"
        >
          {{ cartService.cart().total_items }}
        </p>
      </li>
      <li>
        <div class="relative" (mouseenter)="toggleDropdown()" (mouseleave)="toggleDropdown()">
          <i class="fa-regular fa-user"></i>
          <div
            [ngClass]="
              showDropdown
                ? 'block absolute -bottom-9 rounded p-2 z-50 bg-slate-700 text-white w-fit text-nowrap'
                : 'hidden'
            "
          >
            <ul>
              <li (click)="goToAdminPage()">Admin Actions</li>
            </ul>
          </div>
        </div>
      </li>
      <div
        (click)="toggleMobileNav()"
        class="[&>*]:w-5 [&>*]:h-[1.5px] [&>*]:bg-white [&>*]:my-1 md:hidden"
      >
        <div class=""></div>
        <div class=""></div>
        <div class=""></div>
      </div>
    </ul>
  </nav>
</div>
