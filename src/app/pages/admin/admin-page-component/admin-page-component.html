<button (click)="toggleAside()">Show Sidebar</button>

<div class="container h-fit min-h-dvh flex justify-between relative w-dvw bg-fixed">
  <aside
    class="h-[95%] rounded-t p-5 absolute left-0 top-1 w-fit mt-4 bg-orange-400 text-black"
    [ngClass]="showAside ? 'flex' : 'hidden'"
  >
    <nav>
      <ul>
        <li (click)="goToOrders()">Orders</li>
        <li (click)="goToAddProduct()">Add Products</li>
      </ul>
    </nav>
  </aside>
  <div class="w-full h-fit">
    <router-outlet></router-outlet>
  </div>
</div>
