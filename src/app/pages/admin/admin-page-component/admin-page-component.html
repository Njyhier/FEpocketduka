<button (click)="toggleAside()">Show Sidebar</button>

<div class="container h-fit min-h-dvh flex gap-1 justify-between w-dvw">
  <aside
    (mouseleave)="toggleAside()"
    class="h-[95dvh] rounded-t p-5 w-1/6 min-w-fit mt-4 bg-slate-900 text-white"
    [ngClass]="showAside ? 'flex' : 'hidden'"
  >
    <nav>
      <ul>
        <li (click)="goToOrders()">Orders</li>
        <li (click)="goToAddProduct()">Add Products</li>
      </ul>
    </nav>
  </aside>
  <div class="w-full h-fit">
    <router-outlet></router-outlet>
  </div>
</div>
