<div class="cont">
  <table>
    <tbody>
      <tr>
        <td>Order</td>
        <td>Status</td>
        <td>Placed On</td>
        <td>Action</td>
      </tr>
      @for (o of orders(); track o.id) {
        <tr>
          <td>{{ o.id }}</td>
          <td>{{ o.status }}</td>
          <td>{{ o.created_at | date: 'shortDate' }}</td>
          <td><button (click)="updateOrderStatus(o.id ?? '')">Update Status</button></td>
        </tr>
      }
    </tbody>
  </table>
</div>
