<div class="container">
  <table>
    <tbody>
      <tr>
        <td>Order</td>
        <td>Status</td>
        <td>Placed On</td>
      </tr>
      @for (o of orders(); track o.id) {
        <tr>
          <td>{{ o.id }}</td>
          <td>{{ o.status }}</td>
          <td>{{ o.created_at }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
