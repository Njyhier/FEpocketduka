name: Build and Push Docker Image

# trigger
on:
  push:
    branches: ['main']
    tags:
      - 'v*.*.*'

# steps
jobs:
  build:
    runs-on: ubuntu-latest # vm (has cpu, ram and ssd)

    steps:
      - name: Checkout code # download code into vm
        uses: actions/checkout@v4

      - name: Install NodeJs
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: |
          npm install

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            njyhier/pduka:latest
            njyhier/pduka:${{ github.sha }}
            njyhier/pduka:${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
